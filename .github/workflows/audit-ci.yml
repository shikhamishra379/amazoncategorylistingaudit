name: Run Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pandas openpyxl xlrd

    - name: Run audit on sample data
      run: python main.py --file sample_data/sample_health_listings.csv --category health_and_beauty --output test_report.xlsx

    - name: Confirm output exists
      run: test -f test_report.xlsx && echo "Audit passed successfully!"
